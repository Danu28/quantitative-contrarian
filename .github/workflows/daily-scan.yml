name: Daily Scan

on:
  schedule:
    # 3:30 AM UTC = 9:00 AM IST (UTC+5:30, year-round)
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe slug"
        required: false
        default: "nifty50"
      date:
        description: "Date (YYYY-MM-DD) or leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run daily scan
        id: scan
        continue-on-error: true
        run: |
          TODAY=$(date +%Y-%m-%d)
          ARGS="--universe ${{ inputs.universe || 'nifty50' }} --output reports/${TODAY}.html"
          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
            TODAY="${{ inputs.date }}"
          fi
          python daily_scan.py $ARGS
          cp "reports/${TODAY}.html" reports/latest.html
          echo "report_date=${TODAY}" >> $GITHUB_OUTPUT
          echo "report_path=reports/${TODAY}.html" >> $GITHUB_OUTPUT

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
